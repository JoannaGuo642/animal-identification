# catdog

train: dataset\train
#指定了训练集的路径，模型将在此路径下的数据上进行训练。训练集通常包含大量带标签的数据，用于训练模型，使其能够学习到输入与输出之间的关系。
val: dataset\valid
#指定了验证集的路径。验证集用于在训练过程中评估模型的性能。通过在每个训练周期（epoch）结束后使用验证集，可以监控模型的学习进度，防止过拟合（即模型在训练数据上表现良好但在未见过的数据上表现差）。
test: dataset\test
#指定了测试集的路径。测试集包含的样本用于在训练完成后评估模型的最终性能。测试集的数据在训练过程中未被使用，这样可以提供一个公正的评估标准，确保模型的泛化能力（即在新数据上的表现）。通过测试集的结果，开发者可以了解模型在实际应用中的效果。

# Classes
names:
  0: hamster
  #表示索引 0 对应的类别是“狗”。
  1: bird
  #表示索引 1 对应的类别是“人”。
  2: capybara
  #表示索引 2 对应的类别是“猫”。
  3: rabbit